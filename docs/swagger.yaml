# OpenCLI API Specification
# Generated by Copilot

openapi: 3.0.0
info:
  title: OpenCLI API
  description: API for managing OpenPanel hosting platform
  version: 1.0.0
  contact:
    name: OpenPanel Support
    url: https://openpanel.com/support
    email: support@openpanel.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://panel.example.com/api/v1
    description: Production API server
  - url: http://localhost:8090/api/v1
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Domain:
      type: object
      properties:
        name:
          type: string
          example: example.com
        user:
          type: string
          example: client1
        created_at:
          type: string
          format: date-time
          example: 2023-01-15 14:30:22
        status:
          type: string
          enum: [active, suspended]
          example: active

    User:
      type: object
      properties:
        username:
          type: string
          example: client1
        email:
          type: string
          format: email
          example: client1@example.com
        plan:
          type: string
          example: basic
        created_at:
          type: string
          format: date-time
          example: 2023-01-15 14:30:22
        status:
          type: string
          enum: [active, suspended]
          example: active

    Plan:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Basic
        description:
          type: string
          example: Basic Hosting Plan
        email_limit:
          type: integer
          example: 10
        ftp_limit:
          type: integer
          example: 5
        domains_limit:
          type: integer
          example: 10
        websites_limit:
          type: integer
          example: 5
        disk_limit:
          type: string
          example: 50 GB
        inodes_limit:
          type: integer
          example: 500000
        db_limit:
          type: integer
          example: 10
        cpu:
          type: integer
          example: 2
        ram:
          type: string
          example: 4g
        docker_image:
          type: string
          example: openpanel/nginx
        bandwidth:
          type: integer
          example: 1000

    Backup:
      type: object
      properties:
        id:
          type: string
          example: backup_client1_20230601_112233
        created_at:
          type: string
          format: date-time
          example: 2023-06-01 11:22:33
        size:
          type: string
          example: 1.2 GB
        type:
          type: string
          enum: [full, partial]
          example: full

    Error:
      type: object
      properties:
        error:
          type: string
          example: Resource not found
        status:
          type: integer
          example: 404

security:
  - BearerAuth: []

paths:
  /domains:
    get:
      summary: List all domains
      description: Retrieves a list of all domains or filters by username
      parameters:
        - name: user
          in: query
          description: Filter domains by username
          required: false
          schema:
            type: string
        - name: format
          in: query
          description: Response format
          required: false
          schema:
            type: string
            enum: [json, simple]
            default: json
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      $ref: "#/components/schemas/Domain"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Add a domain
      description: Adds a new domain for a specified user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                domain:
                  type: string
                  example: newdomain.com
                user:
                  type: string
                  example: username
                docroot:
                  type: string
                  example: /var/www/html/newdomain
              required:
                - domain
                - user
      responses:
        "200":
          description: Domain added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Domain newdomain.com has been added for user client1
                  domain:
                    $ref: "#/components/schemas/Domain"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /domains/{domain}:
    delete:
      summary: Delete a domain
      description: Deletes a domain
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
          description: Domain name to delete
        - name: force
          in: query
          schema:
            type: boolean
          description: Force deletion without confirmation
      responses:
        "200":
          description: Domain deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Domain example.com has been deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Domain not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users:
    get:
      summary: List all users
      description: Retrieves a list of all users
      parameters:
        - name: format
          in: query
          description: Response format
          required: false
          schema:
            type: string
            enum: [json, simple]
            default: json
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a user
      description: Creates a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: newuser
                password:
                  type: string
                  example: securepassword
                email:
                  type: string
                  format: email
                  example: newuser@example.com
                plan:
                  type: string
                  example: basic
              required:
                - username
                - password
                - email
                - plan
      responses:
        "200":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User newuser has been created
                  user:
                    $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{username}:
    delete:
      summary: Delete a user
      description: Deletes a user account and all associated data
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: Username to delete
        - name: backup
          in: query
          schema:
            type: boolean
          description: Create backup before deletion
        - name: force
          in: query
          schema:
            type: boolean
          description: Force deletion without confirmation
      responses:
        "200":
          description: User deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User username has been deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /plans:
    get:
      summary: List all plans
      description: Retrieves a list of all hosting plans
      parameters:
        - name: format
          in: query
          description: Response format
          required: false
          schema:
            type: string
            enum: [json, table]
            default: json
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items:
                      $ref: "#/components/schemas/Plan"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      summary: Create a plan
      description: Creates a new hosting plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: custom
                description:
                  type: string
                  example: Custom Plan
                email_limit:
                  type: integer
                  example: 50
                ftp_limit:
                  type: integer
                  example: 10
                domains_limit:
                  type: integer
                  example: 20
                websites_limit:
                  type: integer
                  example: 10
                disk_limit:
                  type: integer
                  example: 75
                inodes_limit:
                  type: integer
                  example: 750000
                db_limit:
                  type: integer
                  example: 20
                cpu:
                  type: integer
                  example: 3
                ram:
                  type: integer
                  example: 6
                docker_image:
                  type: string
                  example: nginx
                bandwidth:
                  type: integer
                  example: 1500
              required:
                - name
                - description
                - domains_limit
                - disk_limit
                - cpu
                - ram
      responses:
        "200":
          description: Plan created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Plan 'custom' has been created
                  plan:
                    $ref: "#/components/schemas/Plan"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /plans/{plan_id}:
    put:
      summary: Update a plan
      description: Updates an existing hosting plan
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the plan to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: custom-renamed
                description:
                  type: string
                  example: Updated Custom Plan
                email_limit:
                  type: integer
                  example: 75
                ftp_limit:
                  type: integer
                  example: 15
                domains_limit:
                  type: integer
                  example: 25
                websites_limit:
                  type: integer
                  example: 12
                disk_limit:
                  type: integer
                  example: 80
                inodes_limit:
                  type: integer
                  example: 800000
                db_limit:
                  type: integer
                  example: 22
                cpu:
                  type: integer
                  example: 4
                ram:
                  type: integer
                  example: 8
                docker_image:
                  type: string
                  example: nginx
                bandwidth:
                  type: integer
                  example: 1600
      responses:
        "200":
          description: Plan updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Plan has been updated
                  plan:
                    $ref: "#/components/schemas/Plan"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /php/versions:
    get:
      summary: List PHP versions
      description: Lists available PHP versions and installed versions per user
      parameters:
        - name: user
          in: query
          description: Filter by username
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  available_versions:
                    type: array
                    items:
                      type: string
                    example: ["7.4", "8.0", "8.1", "8.2"]
                  installed_versions:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                    example:
                      client1: ["7.4", "8.1"]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /php/install:
    post:
      summary: Install PHP version
      description: Installs a PHP version for a specific user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: client1
                version:
                  type: string
                  example: 8.2
              required:
                - username
                - version
      responses:
        "200":
          description: PHP version installed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: PHP 8.2 has been installed for user client1
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /backups/{username}:
    get:
      summary: List user backups
      description: Lists backups for a specific user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: Username to list backups for
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  backups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Backup"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /backups:
    post:
      summary: Create a backup
      description: Initiates a backup for a specific user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: client1
                type:
                  type: string
                  enum: [full, partial]
                  default: full
                  example: full
              required:
                - username
      responses:
        "200":
          description: Backup initiated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Backup for user client1 has been initiated
                  backup_id:
                    type: string
                    example: backup_client1_20230615_143322
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /system/uninstall:
    post:
      summary: Initiate uninstall process
      description: Begins the uninstallation of OpenCLI (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                purge:
                  type: boolean
                  default: false
                  description: Remove all configuration files and user data
                keep_backups:
                  type: boolean
                  default: false
                  description: Keep backup files (only with purge=true)
              required: []
      responses:
        "200":
          description: Uninstallation process initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Uninstallation process has been initiated"
                  job_id:
                    type: string
                    example: "uninstall_20230615_143322"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /system/uninstall/status/{job_id}:
    get:
      summary: Check uninstall status
      description: Checks the status of an uninstallation job
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: ID of the uninstall job
      responses:
        "200":
          description: Status response
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    example: "uninstall_20230615_143322"
                  status:
                    type: string
                    enum: [pending, in_progress, completed, failed]
                    example: "in_progress"
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                    example: 65
                  message:
                    type: string
                    example: "Removing OpenCLI files"
                  completed_steps:
                    type: array
                    items:
                      type: string
                    example: ["stop_services", "remove_opencli_files"]
                  remaining_steps:
                    type: array
                    items:
                      type: string
                    example: ["remove_config_files", "cleanup_system"]
                  error:
                    type: string
                    nullable: true
                    example: null
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /system/status:
    get:
      summary: Get system status information
      description: Returns system resource usage and service status information
      responses:
        "200":
          description: System status information
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, warning, critical]
                    example: ok
                  cpu:
                    type: object
                    properties:
                      usage_percentage:
                        type: number
                        format: float
                        example: 24.5
                  memory:
                    type: object
                    properties:
                      total:
                        type: string
                        example: "16384 MB"
                      used:
                        type: string
                        example: "8192 MB"
                      usage_percentage:
                        type: number
                        format: integer
                        example: 50
                  disk:
                    type: object
                    properties:
                      used:
                        type: string
                        example: "45G"
                      available:
                        type: string
                        example: "55G"
                      usage_percentage:
                        type: number
                        format: integer
                        example: 45
                  services:
                    type: object
                    properties:
                      openpanel:
                        type: string
                        enum: [running, stopped]
                        example: running
                      admin:
                        type: string
                        enum: [running, stopped]
                        example: running
                      mysql:
                        type: string
                        enum: [running, stopped]
                        example: running
                      nginx:
                        type: string
                        enum: [running, stopped]
                        example: running
                  version:
                    type: string
                    example: "1.2.3"
                  uptime:
                    type: string
                    example: "2 days, 5 hours, 30 minutes"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /system/services:
    post:
      summary: Control system services
      description: Start, stop, or restart system services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                service:
                  type: string
                  enum: [openpanel, admin, mysql, nginx]
                  example: "openpanel"
                action:
                  type: string
                  enum: [start, stop, restart]
                  example: "restart"
              required:
                - service
                - action
      responses:
        "200":
          description: Service action completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Service openpanel restart operation completed successfully"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - Admin privileges required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Service operation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
